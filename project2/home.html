    <!DOCTYPE html>
<html>
<head>
    <title>Workshop Registration Form</title>
</head>

<body>

<h1>Workshop Registration Form</h1>
<hr>

<form action="#" method="post">

<div>
    <label>First Name *</label>
    <input type="text" name="firstname" required>
</div>
<br>

<div>
    <label>Last Name *</label>
    <input type="text" name="lastname" required>
</div>
<br>

<div>
    <label>Email *</label>
    <input type="email" name="email" required>
</div>
<br>

<div>
    <label>Gender *</label><br>
    <input type="radio" name="gender" value="male" required> Male
    <input type="radio" name="gender" value="female" required> Female
</div>
<br>

<div>
    <label>Select Course *</label><br>
    <input type="checkbox" name="course" value="ECE"> ECE <br>
    <input type="checkbox" name="course" value="CSE"> CSE <br>
    <input type="checkbox" name="course" value="IS"> IS <br>
    <input type="checkbox" name="course" value="AIML"> AIML <br>
    <input type="checkbox" name="course" value="MECH"> MECH <br>
    <input type="checkbox" name="course" value="EEE"> EEE
</div>
<br>

<div>
    <label>Phone Number *</label>
    <input type="tel" name="phone" required>
</div>
<br>

<div>
    <label>Address *</label><br>
    <textarea name="address" rows="3" cols="30" required></textarea>
</div>
<br>

<div>
    <label>Upload File</label>
    <input type="file" name="file">
</div>
<br>

<div>
    <label>Website URL</label>
    <input type="url" name="website">
</div>
<br>

<div>
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
</div>

</form>

</body>
</html>
</body>
